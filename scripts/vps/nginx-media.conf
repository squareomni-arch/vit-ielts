# ─────────────────────────────────────────────────────────────────────────────
# Vit IELTS — Media Upload & Static Serving
#
# ADD these two location blocks inside your existing server {} block for
# cms.vitieltstest.com (e.g. /etc/nginx/sites-enabled/cms.conf)
#
# Replace PASTE_SECRET_HERE with the value from your .env.local MEDIA_UPLOAD_SECRET
# Replace /run/php/phpX.Y-fpm.sock with your actual PHP-FPM socket path
#   (check with: ls /run/php/ or ls /var/run/php/)
# ─────────────────────────────────────────────────────────────────────────────

    # ── Static media files ──────────────────────────────────────────────────
    location /media/ {
        alias /var/www/media/;
        expires 365d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff";

        # Security: block PHP execution inside /media/
        location ~ \.php$ {
            deny all;
        }
    }

    # ── Upload API endpoint ─────────────────────────────────────────────────
    location = /upload-api/upload.php {
        # Increase body size for audio files (up to 100 MB)
        client_max_body_size 100m;

        fastcgi_pass   unix:/run/php/php8.3-fpm.sock;   # ← adjust PHP version
        include        fastcgi_params;
        fastcgi_param  SCRIPT_FILENAME /var/www/upload-api/upload.php;

        # Secrets & config — stored in Nginx only, never in PHP source
        fastcgi_param  UPLOAD_SECRET  PASTE_SECRET_HERE;
        fastcgi_param  MEDIA_DIR      /var/www/media;
        fastcgi_param  MEDIA_URL      https://cms.vitieltstest.com/media;

        fastcgi_read_timeout 120s;
    }
